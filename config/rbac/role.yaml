---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-operator-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agents.io
  resources:
  - agents
  - capabilities
  - channels
  - workflowruns
  - workflows
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agents.io
  resources:
  - agents/finalizers
  - capabilities/finalizers
  - channels/finalizers
  - workflowruns/finalizers
  - workflows/finalizers
  verbs:
  - update
- apiGroups:
  - agents.io
  resources:
  - agents/status
  - capabilities/status
  - channels/status
  - workflowruns/status
  - workflows/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
