---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: gitworkspaces.agents.io
spec:
  group: agents.io
  names:
    kind: GitWorkspace
    listKind: GitWorkspaceList
    plural: gitworkspaces
    singular: gitworkspace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.repository
      name: Repo
      type: string
    - jsonPath: .status.defaultBranch
      name: Branch
      type: string
    - jsonPath: .status.activeWorktrees
      name: Worktrees
      priority: 1
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GitWorkspace is the Schema for the gitworkspaces API.
          A GitWorkspace is a bare-clone Git repository on a PVC with worktree-based
          branch isolation. Multiple agents share one workspace, each working in
          their own worktree on separate branches. The operator handles clone,
          periodic fetch, worktree cleanup, and credential injection.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GitWorkspaceSpec defines the desired state of GitWorkspace.
            properties:
              author:
                description: |-
                  Author configures the default git commit author for this workspace.
                  Overrides the GitRepo-level author if set. Agents can further override
                  per-commit if needed.
                properties:
                  email:
                    description: Email is the author email for commits.
                    type: string
                  name:
                    description: Name is the author name for commits.
                    type: string
                required:
                - email
                - name
                type: object
              clone:
                description: Clone configures how the initial bare clone is performed.
                properties:
                  depth:
                    default: 0
                    description: |-
                      Depth limits the clone history. 0 means full clone.
                      Shallow clones (depth > 0) are faster but limit log/blame operations.
                      For workspaces where agents need full history (e.g., for git log analysis), use 0.
                      For review-only workspaces, a shallow clone (depth: 50) is sufficient.
                    type: integer
                  lfs:
                    default: false
                    description: LFS enables Git Large File Storage support.
                    type: boolean
                  submodules:
                    default: none
                    description: Submodules controls whether to initialize and update
                      submodules.
                    enum:
                    - none
                    - shallow
                    - recursive
                    type: string
                type: object
              gitRepoRef:
                description: |-
                  GitRepoRef references the GitRepo that provides credentials and
                  the repository registry. The referenced GitRepo must be in the
                  same namespace.
                type: string
              images:
                description: Images configures the container images used for workspace
                  operations.
                properties:
                  git:
                    default: alpine/git:latest
                    description: |-
                      Git is the image used for the init container (clone) and sync sidecar (fetch).
                      Must contain the git binary. Default: "alpine/git:latest".
                    type: string
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy is the image pull policy.
                    enum:
                    - Always
                    - Never
                    - IfNotPresent
                    type: string
                type: object
              protectedBranches:
                description: |-
                  ProtectedBranches lists branches that agents cannot push to directly.
                  Agents must work in worktrees on feature branches and create MRs/PRs.
                  Default: ["main", "master"] (enforced by the git tool's deny patterns).
                items:
                  type: string
                type: array
              repository:
                description: |-
                  Repository is the full name of the repository to clone.
                  Must match one of the repositories discovered by the referenced GitRepo.
                  Format depends on provider: "owner/repo" (GitHub), "group/project" (GitLab),
                  or the full URL for generic providers.
                type: string
              storage:
                description: Storage configures the PVC for the workspace.
                properties:
                  accessMode:
                    default: ReadWriteMany
                    description: |-
                      AccessMode controls PVC access mode.
                      Default: ReadWriteMany (supports multi-agent sharing).
                    enum:
                    - ReadWriteOnce
                    - ReadWriteMany
                    type: string
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 10Gi
                    description: |-
                      Size is the PVC storage size. Default: "10Gi".
                      Consider the repo size + number of concurrent worktrees.
                      Each worktree adds working-tree files but shares git objects.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClass:
                    description: |-
                      StorageClass is the Kubernetes storage class.
                      For shared workspaces (multiple agents), this MUST support ReadWriteMany (RWX).
                      Examples: NFS, CephFS, Longhorn RWX, EFS.
                      For single-agent workspaces, ReadWriteOnce (RWO) is sufficient.
                    type: string
                type: object
              suspend:
                default: false
                description: |-
                  Suspend stops the sync sidecar from fetching.
                  The PVC and data remain intact, but no fetches occur.
                type: boolean
              sync:
                description: |-
                  Sync configures automatic fetching from the remote.
                  The sync sidecar runs `git fetch --all` on the bare clone at this interval.
                  Agents see updated remote refs and can decide when to merge/rebase.
                properties:
                  interval:
                    default: 5m
                    description: |-
                      Interval is how often the sidecar runs `git fetch --all` on the bare clone.
                      Uses Go duration format. Default: "5m".
                      The fetch only updates remote refs in the bare clone — it never modifies
                      any worktree's working directory. Agents see updated remote tracking
                      branches and decide when to merge/rebase.
                    type: string
                  mainWorktreeStrategy:
                    default: reset
                    description: |-
                      MainWorktreeStrategy controls how the default-branch worktree (/workspace/main/)
                      stays in sync after a fetch.
                        - reset: Hard reset to origin/<default-branch> after each fetch.
                          This keeps the main worktree as a read-only reference that always
                          reflects the latest remote state. Safe because agents never commit to main.
                        - none: Don't touch the main worktree. Agents manually update it.
                    enum:
                    - reset
                    - none
                    type: string
                type: object
              ttl:
                description: |-
                  TTL is the time-to-live after the workspace becomes idle.
                  When set, the workspace is garbage collected after no consumer
                  has mounted it for this duration. Uses Go duration format.
                  Useful for ephemeral workspaces created by Workflows.
                type: string
              worktree:
                description: Worktree configures worktree lifecycle management.
                properties:
                  cleanupPolicy:
                    default: onMerge
                    description: |-
                      CleanupPolicy controls when branch worktrees are removed.
                        - onMerge: Auto-removed when the branch is deleted on the remote
                          (detected during fetch). This is the common case — branch gets
                          merged via MR/PR, remote branch is deleted, sidecar cleans up worktree.
                        - manual: Worktrees persist until explicitly removed by an agent
                          or by deleting the GitWorkspace.
                    enum:
                    - onMerge
                    - manual
                    type: string
                  maxWorktrees:
                    default: 10
                    description: |-
                      MaxWorktrees limits the number of concurrent branch worktrees.
                      Prevents disk exhaustion from too many parallel branches.
                      0 means unlimited. Default: 10.
                    type: integer
                type: object
            required:
            - gitRepoRef
            - repository
            type: object
          status:
            description: GitWorkspaceStatus defines the observed state of GitWorkspace.
            properties:
              activeWorktrees:
                description: |-
                  ActiveWorktrees lists the current git worktrees in the workspace.
                  Includes the main worktree and any branch worktrees created by agents.
                items:
                  description: WorktreeInfo describes an active git worktree in the
                    workspace.
                  properties:
                    branch:
                      description: Branch is the branch checked out in this worktree.
                      type: string
                    consumer:
                      description: Consumer is the Agent/PiAgent name using this worktree
                        (if tracked).
                      type: string
                    dirty:
                      description: Dirty indicates if the worktree has uncommitted
                        changes.
                      type: boolean
                    headCommit:
                      description: HeadCommit is the SHA of HEAD in this worktree.
                      type: string
                    name:
                      description: |-
                        Name is the worktree name (directory name under /workspace/branches/).
                        For the main worktree, this is "main" (or the default branch name).
                      type: string
                    path:
                      description: Path is the filesystem path relative to the PVC
                        root.
                      type: string
                  required:
                  - branch
                  - name
                  - path
                  type: object
                type: array
              cloneUrl:
                description: CloneURL is the resolved clone URL used for this workspace.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              consumers:
                description: Consumers lists the resources currently using this workspace.
                items:
                  description: GitWorkspaceConsumer tracks a resource that has mounted
                    this workspace.
                  properties:
                    access:
                      description: Access is the access level (readonly, readwrite).
                      type: string
                    kind:
                      description: Kind is the consumer resource type (Agent, PiAgent).
                      type: string
                    name:
                      description: Name is the consumer resource name.
                      type: string
                    since:
                      description: Since is when the consumer started using the workspace.
                      format: date-time
                      type: string
                  required:
                  - access
                  - kind
                  - name
                  type: object
                type: array
              defaultBranch:
                description: |-
                  DefaultBranch is the repository's default branch (e.g., "main").
                  Determined during clone from the remote HEAD.
                type: string
              diskUsage:
                description: DiskUsage is the approximate disk usage of the workspace.
                type: string
              lastFetchTime:
                description: LastFetchTime is the last time a successful git fetch
                  completed.
                format: date-time
                type: string
              phase:
                description: Phase is the current phase of the workspace.
                enum:
                - Pending
                - Cloning
                - Ready
                - Error
                type: string
              pvcName:
                description: PVCName is the name of the managed PVC.
                type: string
              remoteHeadCommit:
                description: |-
                  RemoteHeadCommit is the SHA of origin/<default-branch> HEAD.
                  Updated after each fetch.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
