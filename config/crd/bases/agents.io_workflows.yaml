---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: workflows.agents.io
spec:
  group: agents.io
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    singular: workflow
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.trigger
      name: Trigger
      type: string
    - jsonPath: .spec.steps
      name: Steps
      type: integer
    - jsonPath: .status.lastTriggered
      name: Last Run
      type: date
    - jsonPath: .status.runCount
      name: Runs
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workflow is the Schema for the workflows API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowSpec defines the desired state of Workflow
            properties:
              agent:
                description: |-
                  Agent is the Agent CRD to invoke (simple mode - alternative to Steps).
                  Uses the OpenCode runtime (always-on Deployment, ACP/HTTP protocol).
                  Exactly one of Agent or PiAgent must be set in simple mode.
                type: string
              output:
                description: Output configures where to send workflow results
                properties:
                  fromStep:
                    description: 'FromStep specifies which step''s output to send
                      (default: last step)'
                    type: string
                  github:
                    description: GitHub posts output back to GitHub (for PR/issue
                      triggers)
                    properties:
                      comment:
                        default: true
                        description: Comment posts output as a PR/issue comment
                        type: boolean
                      tokenSecret:
                        description: |-
                          TokenSecret references the GitHub token for API access
                          If not set, uses the trigger's secret
                        properties:
                          key:
                            description: Key is the key in the secret
                            type: string
                          name:
                            description: Name is the name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  gitlab:
                    description: GitLab posts output back to GitLab (for MR/issue
                      triggers)
                    properties:
                      comment:
                        default: true
                        description: Comment posts output as a MR/issue comment
                        type: boolean
                      tokenSecret:
                        description: |-
                          TokenSecret references the GitLab token for API access
                          If not set, uses the trigger's secret
                        properties:
                          key:
                            description: Key is the key in the secret
                            type: string
                          name:
                            description: Name is the name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  notify:
                    description: Notify sends output to a notification channel (for
                      scheduled/manual workflows)
                    properties:
                      slack:
                        description: Slack sends output via Slack webhook
                        properties:
                          webhookSecret:
                            description: WebhookSecret references the secret containing
                              the Slack webhook URL
                            properties:
                              key:
                                description: Key is the key in the secret
                                type: string
                              name:
                                description: Name is the name of the secret
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - webhookSecret
                        type: object
                      telegram:
                        description: Telegram sends output via Telegram
                        properties:
                          botTokenSecret:
                            description: BotTokenSecret references the secret containing
                              the bot token
                            properties:
                              key:
                                description: Key is the key in the secret
                                type: string
                              name:
                                description: Name is the name of the secret
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          chatId:
                            description: ChatID is the Telegram chat/user ID to send
                              to
                            type: string
                        required:
                        - botTokenSecret
                        - chatId
                        type: object
                    type: object
                  webhook:
                    description: Webhook sends output to an HTTP endpoint
                    properties:
                      secret:
                        description: Secret references a secret for webhook authentication
                          (sent as Authorization header)
                        properties:
                          key:
                            description: Key is the key in the secret
                            type: string
                          name:
                            description: Name is the name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      url:
                        description: URL is the endpoint to POST the output to
                        type: string
                    required:
                    - url
                    type: object
                type: object
              piAgent:
                description: |-
                  PiAgent is the PiAgent CRD to invoke (simple mode - alternative to Steps).
                  Uses the Pi runtime (on-demand Job, JSONL event stream).
                  Exactly one of Agent or PiAgent must be set in simple mode.
                type: string
              prompt:
                description: |-
                  Prompt is the message to send to the agent (simple mode)
                  Supports templating with {{.trigger}} for trigger data.
                type: string
              steps:
                description: |-
                  Steps are sequential agent invocations (advanced mode)
                  Use this for multi-step workflows that need conditional logic or multiple agents.
                  Either use (Agent + Prompt) OR Steps, not both.
                items:
                  description: WorkflowStep defines a single step in the workflow
                  properties:
                    agent:
                      description: |-
                        Agent references an Agent CRD to invoke (OpenCode runtime).
                        Exactly one of Agent or PiAgent must be set per step.
                      type: string
                    condition:
                      description: |-
                        Condition is a CEL expression that must evaluate to true for the step to run
                        Available variables: trigger, steps (map of previous step outputs)
                      type: string
                    continueOnError:
                      default: false
                      description: ContinueOnError allows the workflow to continue
                        if this step fails
                      type: boolean
                    name:
                      description: Name is the step identifier (auto-generated if
                        not provided)
                      type: string
                    piAgent:
                      description: |-
                        PiAgent references a PiAgent CRD to invoke (Pi runtime).
                        Exactly one of Agent or PiAgent must be set per step.
                      type: string
                    prompt:
                      description: |-
                        Prompt is the message to send to the agent
                        Supports templating with {{.trigger}} and {{.steps.<name>.output}}
                      type: string
                    timeout:
                      default: 5m
                      description: 'Timeout is the maximum time to wait for the step
                        (default: 5m)'
                      type: string
                  required:
                  - prompt
                  type: object
                type: array
              suspend:
                default: false
                description: Suspend stops the workflow from being triggered
                type: boolean
              trigger:
                description: Trigger defines what starts the workflow
                properties:
                  github:
                    description: GitHub enables triggering from GitHub events
                    properties:
                      actions:
                        description: |-
                          Actions filters to specific actions within an event
                          Examples for pull_request: opened, closed, synchronize, reopened
                          Examples for issues: opened, closed, labeled
                        items:
                          type: string
                        type: array
                      branches:
                        description: |-
                          Branches filters to specific branches (only for push/pull_request events)
                          Supports glob patterns like "main", "release/*", "feature/**"
                        items:
                          type: string
                        type: array
                      events:
                        description: |-
                          Events is the list of GitHub events to trigger on
                          Examples: push, pull_request, issues, issue_comment, pull_request_review
                        items:
                          type: string
                        minItems: 1
                        type: array
                      repos:
                        description: |-
                          Repos filters to specific repositories (optional, format: "owner/repo")
                          If empty, triggers on all repos that send webhooks
                        items:
                          type: string
                        type: array
                      secret:
                        description: Secret references the GitHub webhook secret for
                          HMAC validation
                        properties:
                          key:
                            description: Key is the key in the secret
                            type: string
                          name:
                            description: Name is the name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - events
                    type: object
                  gitlab:
                    description: GitLab enables triggering from GitLab events
                    properties:
                      actions:
                        description: |-
                          Actions filters to specific actions within an event
                          Examples for merge_request: open, close, merge, update
                        items:
                          type: string
                        type: array
                      branches:
                        description: |-
                          Branches filters to specific branches (only for push/merge_request events)
                          Supports glob patterns like "main", "release/*"
                        items:
                          type: string
                        type: array
                      events:
                        description: |-
                          Events is the list of GitLab events to trigger on
                          Examples: push, merge_request, issue, note, pipeline
                        items:
                          type: string
                        minItems: 1
                        type: array
                      projects:
                        description: |-
                          Projects filters to specific projects (optional, format: "group/project" or project ID)
                          If empty, triggers on all projects that send webhooks
                        items:
                          type: string
                        type: array
                      secret:
                        description: Secret references the GitLab webhook token for
                          validation
                        properties:
                          key:
                            description: Key is the key in the secret
                            type: string
                          name:
                            description: Name is the name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - events
                    type: object
                  schedule:
                    description: Schedule enables cron-based triggering
                    properties:
                      cron:
                        description: Cron is the cron schedule expression
                        type: string
                      timezone:
                        default: UTC
                        description: 'Timezone for the schedule (default: UTC)'
                        type: string
                    required:
                    - cron
                    type: object
                  webhook:
                    description: Webhook enables triggering via HTTP POST
                    properties:
                      path:
                        description: 'Path is the URL path for the webhook (default:
                          /workflow/<name>)'
                        type: string
                      secret:
                        description: Secret is the reference to a secret for webhook
                          validation
                        properties:
                          key:
                            description: Key is the key in the secret
                            type: string
                          name:
                            description: Name is the name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                type: object
            required:
            - trigger
            type: object
          status:
            description: WorkflowStatus defines the observed state of Workflow
            properties:
              conditions:
                description: Conditions represent the latest available observations
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastRunStatus:
                description: LastRunStatus is the status of the last run
                type: string
              lastTriggered:
                description: LastTriggered is the last time the workflow was triggered
                format: date-time
                type: string
              runCount:
                description: RunCount is the total number of workflow runs
                type: integer
              webhookURL:
                description: WebhookURL is the URL to trigger this workflow
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
