name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  crd-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      - name: Regenerate CRDs
        run: controller-gen crd:allowDangerousTypes=true paths="./api/..." output:crd:dir=/tmp/crds

      - name: Check for drift
        run: diff -r /tmp/crds config/crd/bases/ || (echo "CRDs are out of date. Run: controller-gen crd:allowDangerousTypes=true paths=./api/... output:crd:dir=config/crd/bases" && exit 1)

  helm-lint:
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint operator chart
        run: helm lint helm/agent-operator

  docker-build:
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false

      - name: Build capability-gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/capability-gateway/Dockerfile
          push: false
