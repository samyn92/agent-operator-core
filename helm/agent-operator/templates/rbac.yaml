apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  # agents.io custom resources
  - apiGroups:
      - agents.io
    resources:
      - agents
      - capabilities
      - channels
      - workflows
      - workflowruns
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - agents.io
    resources:
      - agents/status
      - capabilities/status
      - channels/status
      - workflows/status
      - workflowruns/status
    verbs:
      - get
      - patch
      - update
  # Kubernetes core resources
  - apiGroups:
      - ""
    resources:
      - services
      - configmaps
      - persistentvolumeclaims
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Events for operator status reporting
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
