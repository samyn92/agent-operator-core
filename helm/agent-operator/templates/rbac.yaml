{{- $clusterScoped := .Values.rbac.clusterScoped | default false -}}
apiVersion: rbac.authorization.k8s.io/v1
{{- if $clusterScoped }}
kind: ClusterRole
{{- else }}
kind: Role
{{- end }}
metadata:
  name: {{ include "agent-operator.fullname" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  # agents.io custom resources
  - apiGroups:
      - agents.io
    resources:
      - agents
      - capabilities
      - channels
      - gitrepoes
      - gitworkspaces
      - piagents
      - workflows
      - workflowruns
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - agents.io
    resources:
      - agents/status
      - agents/finalizers
      - capabilities/status
      - channels/status
      - gitrepoes/status
      - gitworkspaces/status
      - piagents/status
      - piagents/finalizers
      - workflows/status
      - workflowruns/status
      - workflowruns/finalizers
    verbs:
      - get
      - patch
      - update
  # Kubernetes core resources
  - apiGroups:
      - ""
    resources:
      - services
      - configmaps
      - persistentvolumeclaims
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Pods — needed by WorkflowRun controller for Job pod log reading
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Events for operator status reporting
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if $clusterScoped }}
kind: ClusterRoleBinding
{{- else }}
kind: RoleBinding
{{- end }}
metadata:
  name: {{ include "agent-operator.fullname" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  {{- if $clusterScoped }}
  kind: ClusterRole
  {{- else }}
  kind: Role
  {{- end }}
  name: {{ include "agent-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
