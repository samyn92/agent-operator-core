apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          args:
            - --leader-elect={{ .Values.leaderElect }}
            - --webhook-bind-address=:{{ .Values.webhook.port }}
            - --namespace={{ .Release.Namespace }}
            {{- if .Values.webhook.enabled }}
            - --callback-base-url=http://{{ include "agent-operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.webhook.service.port }}/callback
            {{- end }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
