replicaCount: 1

image:
  repository: ghcr.io/samyn92/agent-operator
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC configuration
rbac:
  # Use ClusterRole/ClusterRoleBinding instead of namespace-scoped Role/RoleBinding.
  # Set to true if the operator needs to manage agents across multiple namespaces.
  clusterScoped: false

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Leader election (set to true for HA with multiple replicas)
leaderElect: false

nodeSelector: {}
tolerations: []
affinity: {}

# Webhook server configuration
webhook:
  enabled: true
  port: 9090
  service:
    type: ClusterIP
    port: 9090
    annotations: {}
